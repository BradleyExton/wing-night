<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawing Display — 03 Easel · Empty Canvas</title>
    <style>
      :root {
        --bg: #121212;
        --surface: #1c1c1c;
        --surface-alt: #242424;
        --text: #ffffff;
        --muted: #a3a3a3;
        --primary: #f97316;
        --heat: #ef4444;
        --gold: #fbbf24;
        --teamA: #f97316;
        --board: #0e2624;
        --chalk: #f3eee2;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: radial-gradient(ellipse at top, #2a1306 0%, #0f0a08 60%, #050505 100%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .stage {
        height: 100dvh; display: grid;
        grid-template-rows: auto 1fr;
        gap: clamp(0.85rem, 1.4vw, 1.6rem);
        padding: clamp(1rem, 1.6vw, 2rem);
      }

      header.chrome {
        display: grid; grid-template-columns: auto 1fr auto;
        align-items: center; gap: clamp(1rem, 2vw, 2rem);
        background: linear-gradient(180deg, #3a1d09 0%, #1a0c04 100%);
        border: 2px solid var(--gold);
        border-radius: 14px;
        padding: clamp(0.85rem, 1.4vw, 1.4rem) clamp(1.5rem, 2.5vw, 2.5rem);
        box-shadow: 0 0 30px rgba(251,191,36,0.18) inset, 0 6px 18px rgba(0,0,0,0.5);
        position: relative; overflow: hidden;
      }
      header.chrome::before {
        content: ""; position: absolute; top: 0; bottom: 0; left: 0;
        width: 8px; background: var(--teamA);
        box-shadow: 0 0 18px var(--teamA);
      }
      .team-block {
        display: flex; align-items: baseline; gap: clamp(0.85rem, 1.5vw, 1.5rem);
        padding-left: 0.5rem;
      }
      .team-block .name {
        font-size: clamp(1.6rem, 2.4vw, 2.4rem);
        font-weight: 800; letter-spacing: -0.01em;
      }
      .team-block .pts {
        color: var(--gold); font-family: ui-monospace, monospace;
        font-size: clamp(1.05rem, 1.4vw, 1.4rem); font-weight: 800;
      }
      .drawer-block {
        text-align: center;
        font-family: "Georgia", serif; font-style: italic;
        color: var(--gold);
        font-size: clamp(1.1rem, 1.6vw, 1.6rem);
        text-shadow: 0 0 14px rgba(251,191,36,0.35);
      }
      .drawer-block .lbl {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        text-transform: uppercase; letter-spacing: 0.28em;
        font-size: clamp(0.65rem, 0.85vw, 0.85rem); font-weight: 800;
        color: var(--muted); font-style: normal; margin-right: 0.6rem;
      }
      .timer-block {
        display: flex; flex-direction: column; align-items: flex-end; gap: 0.1rem;
      }
      .timer-block .lbl {
        text-transform: uppercase; letter-spacing: 0.28em;
        color: var(--muted); font-size: clamp(0.65rem, 0.85vw, 0.85rem);
        font-weight: 800;
      }
      .timer-block .v {
        font-family: ui-monospace, monospace;
        font-size: clamp(2rem, 3vw, 3rem); font-weight: 800;
        color: var(--primary); letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums; line-height: 1;
      }

      main.center {
        display: grid; grid-template-columns: 1fr;
        min-height: 0; align-items: stretch;
      }
      .easel-wrap {
        position: relative;
        display: grid; place-items: center;
      }
      .easel {
        position: relative;
        width: 100%; height: 100%;
        background: linear-gradient(180deg, #5a3318 0%, #2c1808 100%);
        border-radius: 14px;
        padding: 18px;
        box-shadow:
          0 16px 36px rgba(0,0,0,0.6),
          inset 0 0 0 2px #6a3d1a;
      }
      .easel::before, .easel::after {
        content: "";
        position: absolute; top: 100%; width: 18px; height: 70px;
        background: linear-gradient(180deg, #5a3318, #2c1808);
        border-radius: 0 0 4px 4px;
        box-shadow: inset 0 0 0 1px #6a3d1a;
      }
      .easel::before { left: 18%; transform: rotate(8deg); }
      .easel::after  { right: 18%; transform: rotate(-8deg); }
      .board {
        width: 100%; height: 100%;
        background:
          linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          radial-gradient(ellipse at 50% 30%, #14302d 0%, var(--board) 70%, #06181a 100%);
        background-size: 36px 36px, 36px 36px, 100% 100%;
        border-radius: 6px;
        position: relative; overflow: hidden;
        box-shadow: inset 0 0 60px rgba(0,0,0,0.55);
        display: grid; place-items: center;
      }
      .awaiting {
        font-family: "Georgia", serif; font-style: italic;
        font-size: clamp(1.4rem, 2.4vw, 2.4rem);
        color: var(--gold);
        opacity: 0.55;
        text-shadow: 0 0 14px rgba(251,191,36,0.25);
        animation: shimmer 2.4s ease-in-out infinite;
        letter-spacing: 0.02em;
      }
      @keyframes shimmer {
        0%,100% { opacity: 0.4; }
        50% { opacity: 0.75; }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <header class="chrome">
        <div class="team-block">
          <span class="name">Team Heat</span>
          <span class="pts">+0 pending</span>
        </div>
        <div class="drawer-block">
          <span class="lbl">Drawer</span>Maria
        </div>
        <div class="timer-block">
          <span class="lbl">Turn</span>
          <span class="v">2:00</span>
        </div>
      </header>

      <main class="center">
        <div class="easel-wrap">
          <div class="easel">
            <div class="board">
              <span class="awaiting">awaiting first stroke…</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
