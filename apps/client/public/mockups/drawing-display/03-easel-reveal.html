<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawing Display — 03 Easel · Correct Reveal</title>
    <style>
      :root {
        --bg: #121212;
        --surface: #1c1c1c;
        --surface-alt: #242424;
        --text: #ffffff;
        --muted: #a3a3a3;
        --primary: #f97316;
        --heat: #ef4444;
        --gold: #fbbf24;
        --green: #2fb86c;
        --teamA: #f97316;
        --board: #0e2624;
        --chalk: #f3eee2;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: radial-gradient(ellipse at top, #2a1306 0%, #0f0a08 60%, #050505 100%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .stage {
        height: 100dvh; display: grid;
        grid-template-rows: auto 1fr;
        gap: clamp(0.85rem, 1.4vw, 1.6rem);
        padding: clamp(1rem, 1.6vw, 2rem);
      }

      header.chrome {
        display: grid; grid-template-columns: auto 1fr auto;
        align-items: center; gap: clamp(1rem, 2vw, 2rem);
        background: linear-gradient(180deg, #3a1d09 0%, #1a0c04 100%);
        border: 2px solid var(--gold);
        border-radius: 14px;
        padding: clamp(0.85rem, 1.4vw, 1.4rem) clamp(1.5rem, 2.5vw, 2.5rem);
        box-shadow: 0 0 30px rgba(251,191,36,0.18) inset, 0 6px 18px rgba(0,0,0,0.5);
        position: relative; overflow: hidden;
      }
      header.chrome::before {
        content: ""; position: absolute; top: 0; bottom: 0; left: 0;
        width: 8px; background: var(--teamA);
        box-shadow: 0 0 18px var(--teamA);
      }
      .team-block {
        display: flex; align-items: baseline; gap: clamp(0.85rem, 1.5vw, 1.5rem);
        padding-left: 0.5rem;
      }
      .team-block .name {
        font-size: clamp(1.6rem, 2.4vw, 2.4rem);
        font-weight: 800; letter-spacing: -0.01em;
      }
      .team-block .pts {
        color: var(--gold); font-family: ui-monospace, monospace;
        font-size: clamp(1.05rem, 1.4vw, 1.4rem); font-weight: 800;
      }
      .drawer-block {
        text-align: center;
        font-family: "Georgia", serif; font-style: italic;
        color: var(--gold);
        font-size: clamp(1.1rem, 1.6vw, 1.6rem);
        text-shadow: 0 0 14px rgba(251,191,36,0.35);
      }
      .drawer-block .lbl {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        text-transform: uppercase; letter-spacing: 0.28em;
        font-size: clamp(0.65rem, 0.85vw, 0.85rem); font-weight: 800;
        color: var(--muted); font-style: normal; margin-right: 0.6rem;
      }
      .timer-block {
        display: flex; flex-direction: column; align-items: flex-end; gap: 0.1rem;
      }
      .timer-block .lbl {
        text-transform: uppercase; letter-spacing: 0.28em;
        color: var(--muted); font-size: clamp(0.65rem, 0.85vw, 0.85rem);
        font-weight: 800;
      }
      .timer-block .v {
        font-family: ui-monospace, monospace;
        font-size: clamp(2rem, 3vw, 3rem); font-weight: 800;
        color: var(--primary); letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums; line-height: 1;
      }

      main.center {
        display: grid; grid-template-columns: 1fr;
        min-height: 0; align-items: stretch;
      }
      .easel-wrap {
        position: relative;
        display: grid; place-items: center;
      }
      .easel {
        position: relative;
        width: 100%; height: 100%;
        background: linear-gradient(180deg, #5a3318 0%, #2c1808 100%);
        border-radius: 14px;
        padding: 18px;
        box-shadow:
          0 16px 36px rgba(0,0,0,0.6),
          inset 0 0 0 2px #6a3d1a;
      }
      .easel::before, .easel::after {
        content: "";
        position: absolute; top: 100%; width: 18px; height: 70px;
        background: linear-gradient(180deg, #5a3318, #2c1808);
        border-radius: 0 0 4px 4px;
        box-shadow: inset 0 0 0 1px #6a3d1a;
      }
      .easel::before { left: 18%; transform: rotate(8deg); }
      .easel::after  { right: 18%; transform: rotate(-8deg); }
      .board {
        width: 100%; height: 100%;
        background:
          linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          radial-gradient(ellipse at 50% 30%, #14302d 0%, var(--board) 70%, #06181a 100%);
        background-size: 36px 36px, 36px 36px, 100% 100%;
        border-radius: 6px;
        position: relative; overflow: hidden;
        box-shadow: inset 0 0 60px rgba(0,0,0,0.55);
      }
      .board svg.canvas-svg { width: 100%; height: 100%; display: block; }
      .stroke-soft {
        filter: drop-shadow(0 0 1.5px rgba(255,255,255,0.4));
        opacity: 0.45;
      }

      /* Reveal lower-third banner */
      .reveal {
        position: absolute;
        left: 50%; bottom: 8%;
        transform: translateX(-50%);
        min-width: 60%;
        background: linear-gradient(180deg, #2a4d1f 0%, #0e2a14 100%);
        border: 3px solid var(--green);
        border-radius: 16px;
        padding: clamp(1rem, 1.6vw, 1.6rem) clamp(1.5rem, 2.5vw, 2.5rem);
        box-shadow: 0 0 60px rgba(47,184,108,0.35), 0 12px 28px rgba(0,0,0,0.55);
        display: grid; grid-template-columns: auto 1fr auto;
        align-items: center; gap: clamp(1rem, 2vw, 2rem);
        animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes pop {
        0% { transform: translate(-50%, 12px) scale(0.92); opacity: 0; }
        100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
      }
      .reveal .check {
        font-size: clamp(2.6rem, 4vw, 4rem);
        font-weight: 900;
        color: var(--green);
        line-height: 1;
        text-shadow: 0 0 24px rgba(47,184,108,0.6);
      }
      .reveal .text {
        font-family: "Georgia", serif;
        font-weight: 700; font-style: italic;
        font-size: clamp(2rem, 3.4vw, 3.4rem);
        line-height: 1;
        text-shadow: 0 0 18px rgba(255,255,255,0.25);
      }
      .reveal .text .lbl {
        display: block;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-style: normal; font-weight: 800;
        text-transform: uppercase; letter-spacing: 0.32em;
        font-size: clamp(0.7rem, 0.95vw, 0.95rem);
        color: var(--green);
        margin-bottom: 0.3rem;
      }
      .reveal .award {
        text-align: right;
        font-family: ui-monospace, monospace;
      }
      .reveal .award .pts {
        font-size: clamp(2.4rem, 3.6vw, 3.6rem);
        font-weight: 900;
        color: var(--gold);
        line-height: 1;
        text-shadow: 0 0 18px rgba(251,191,36,0.5);
      }
      .reveal .award .for {
        display: block;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        text-transform: uppercase; letter-spacing: 0.28em;
        font-size: clamp(0.7rem, 0.9vw, 0.9rem);
        color: var(--muted); font-weight: 700;
        margin-top: 0.3rem;
      }
      /* Sparkles */
      .spark {
        position: absolute;
        font-size: 1.2rem; color: var(--gold); opacity: 0.85;
        text-shadow: 0 0 10px var(--gold);
        animation: twinkle 1.4s ease-in-out infinite;
      }
      .spark.s1 { top: 6%; left: 12%; animation-delay: 0s; }
      .spark.s2 { top: 14%; right: 14%; animation-delay: 0.3s; }
      .spark.s3 { top: 22%; left: 28%; animation-delay: 0.6s; }
      .spark.s4 { top: 8%; right: 32%; animation-delay: 0.9s; }
      @keyframes twinkle {
        0%,100% { transform: scale(0.7); opacity: 0.4; }
        50% { transform: scale(1.1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <header class="chrome">
        <div class="team-block">
          <span class="name">Team Heat</span>
          <span class="pts">+3 pending</span>
        </div>
        <div class="drawer-block">
          <span class="lbl">Drawer</span>Maria
        </div>
        <div class="timer-block">
          <span class="lbl">Turn</span>
          <span class="v">1:22</span>
        </div>
      </header>

      <main class="center">
        <div class="easel-wrap">
          <div class="easel">
            <div class="board">
              <svg class="canvas-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
                <g class="stroke-soft">
                  <path d="M 250 180 L 950 180 L 600 700 Z"
                        stroke="#f3eee2" stroke-width="10" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" />
                  <path d="M 270 180 Q 290 150 320 180 Q 350 150 380 180 Q 410 150 440 180 Q 470 150 500 180 Q 530 150 560 180 Q 590 150 620 180 Q 650 150 680 180 Q 710 150 740 180 Q 770 150 800 180 Q 830 150 860 180 Q 890 150 920 180"
                        stroke="#fbbf24" stroke-width="12" fill="none"
                        stroke-linecap="round" stroke-linejoin="round" />
                  <circle cx="480" cy="290" r="34" stroke="#ef4444" stroke-width="9" fill="none" />
                  <circle cx="700" cy="320" r="34" stroke="#ef4444" stroke-width="9" fill="none" />
                  <circle cx="560" cy="450" r="34" stroke="#ef4444" stroke-width="9" fill="none" />
                  <path d="M 720 470 a 34 34 0 1 1 -10 -30"
                        stroke="#ef4444" stroke-width="9" fill="none" stroke-linecap="round" />
                </g>
              </svg>
              <span class="spark s1">✦</span>
              <span class="spark s2">✦</span>
              <span class="spark s3">✧</span>
              <span class="spark s4">✧</span>
              <div class="reveal">
                <span class="check">✓</span>
                <div class="text">
                  <span class="lbl">The answer was</span>
                  Pizza slice
                </div>
                <div class="award">
                  <span class="pts">+1</span>
                  <span class="for">Team Heat</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
