<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawing Display — 02 Heat Console</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --surface-alt: #1c1c1c;
        --text: #ffffff;
        --muted: #8d8d8d;
        --primary: #f97316;
        --heat: #ef4444;
        --gold: #fbbf24;
        --teamA: #f97316;
        --teamB: #06b6d4;
        --teamC: #84cc16;
        --teamD: #f43f5e;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .stage {
        height: 100dvh; display: grid;
        grid-template-rows: auto 1fr;
        gap: clamp(0.85rem, 1.2vw, 1.5rem);
        padding: clamp(0.85rem, 1.5vw, 1.75rem);
      }
      header.bar {
        display: grid; grid-template-columns: 1fr auto 1fr;
        align-items: center; gap: 1rem;
        background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
        border: 1px solid #262626; border-radius: 10px;
        padding: clamp(0.85rem, 1.2vw, 1.2rem) clamp(1.25rem, 2vw, 2rem);
        font-family: ui-monospace, "Menlo", "Consolas", monospace;
      }
      .meta-l, .meta-r {
        display: flex; align-items: center; gap: 1.5rem;
        text-transform: uppercase; letter-spacing: 0.18em;
        font-size: clamp(0.85rem, 1.1vw, 1.1rem);
      }
      .meta-r { justify-content: flex-end; }
      .meta-l .live::before {
        content: ""; display: inline-block; width: 8px; height: 8px;
        border-radius: 50%; margin-right: 0.5rem; vertical-align: middle;
        background: var(--heat); box-shadow: 0 0 10px var(--heat);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.55; transform: scale(0.9); }
      }
      .meta-l .live { color: var(--heat); font-weight: 700; }
      .round-id {
        text-align: center; font-weight: 700;
        color: var(--primary); font-size: clamp(1.1rem, 1.5vw, 1.5rem);
        letter-spacing: 0.32em;
      }
      .round-id .sub {
        display: block; color: var(--muted); font-size: clamp(0.7rem, 0.9vw, 0.9rem);
        font-weight: 500; margin-top: 0.15rem;
      }

      main.main {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: clamp(0.85rem, 1.2vw, 1.5rem);
        min-height: 0;
      }
      .canvas-frame {
        position: relative;
        background:
          linear-gradient(0deg, rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
          radial-gradient(ellipse at center, #181818 0%, #060606 80%);
        background-size: 40px 40px, 40px 40px, 100% 100%;
        border: 1px solid #1f1f1f;
        border-radius: 10px;
        box-shadow: inset 0 0 80px rgba(249,115,22,0.06);
        overflow: hidden;
      }
      .canvas-frame::before, .canvas-frame::after {
        content: "";
        position: absolute; width: 36px; height: 36px;
        border: 2px solid var(--primary); opacity: 0.7;
      }
      .canvas-frame::before { top: 16px; left: 16px;
        border-right: none; border-bottom: none; }
      .canvas-frame::after { bottom: 16px; right: 16px;
        border-left: none; border-top: none; }
      .canvas-frame svg { display: block; width: 100%; height: 100%; }
      .stroke-glow { filter: drop-shadow(0 0 7px currentColor); }

      .crosshair-text {
        position: absolute; top: 16px; right: 24px;
        font-family: ui-monospace, monospace;
        color: var(--muted); font-size: clamp(0.75rem, 0.95vw, 0.95rem);
        letter-spacing: 0.16em;
      }
      .crosshair-text strong { color: var(--primary); font-weight: 700; }

      /* Right rail */
      aside.rail {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: clamp(0.85rem, 1.2vw, 1.2rem);
      }
      .panel {
        background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
        border: 1px solid #262626; border-radius: 10px;
        padding: clamp(1rem, 1.4vw, 1.4rem);
      }
      .panel .label {
        text-transform: uppercase; letter-spacing: 0.32em;
        color: var(--muted); font-size: clamp(0.7rem, 0.95vw, 0.9rem);
        font-family: ui-monospace, monospace;
      }
      .turn-panel { border-left: 4px solid var(--teamA); }
      .turn-panel .name {
        font-size: clamp(1.7rem, 2.6vw, 2.6rem); font-weight: 800;
        line-height: 1.05; margin-top: 0.35rem;
      }
      .turn-panel .meta {
        margin-top: 0.6rem;
        display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
        font-family: ui-monospace, monospace;
      }
      .turn-panel .meta .v {
        font-size: clamp(1rem, 1.4vw, 1.4rem); font-weight: 800;
        color: var(--gold);
      }
      .turn-panel .meta .v.muted { color: var(--text); }

      .timer-panel {
        display: flex; flex-direction: column; align-items: center;
        gap: 0.4rem;
      }
      .timer-panel .v {
        font-family: ui-monospace, monospace;
        font-size: clamp(4rem, 7vw, 7rem); font-weight: 800;
        color: var(--primary); letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums; line-height: 1;
      }

      .telem-panel {
        display: grid; gap: 0.85rem;
        align-content: start;
      }
      .telem-panel .row {
        display: flex; justify-content: space-between; align-items: baseline;
        padding: 0.35rem 0; border-bottom: 1px dashed #262626;
        font-family: ui-monospace, monospace;
      }
      .telem-panel .row:last-child { border-bottom: none; }
      .telem-panel .k {
        text-transform: uppercase; letter-spacing: 0.18em;
        color: var(--muted); font-size: clamp(0.72rem, 0.95vw, 0.92rem);
      }
      .telem-panel .v {
        color: var(--primary); font-size: clamp(1rem, 1.3vw, 1.25rem);
        font-weight: 700;
      }

      footer.ticker {
        background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
        border: 1px solid #262626; border-radius: 10px;
        padding: clamp(0.85rem, 1.2vw, 1.2rem) clamp(1.25rem, 2vw, 2rem);
        display: grid; grid-template-columns: auto repeat(4, 1fr);
        gap: clamp(1rem, 1.5vw, 1.75rem);
        align-items: center;
        font-family: ui-monospace, monospace;
      }
      .ticker-label {
        text-transform: uppercase; letter-spacing: 0.32em;
        color: var(--muted); font-size: clamp(0.75rem, 1vw, 1rem);
      }
      .row {
        display: flex; align-items: center; gap: 0.85rem;
      }
      .row .swatch {
        width: 0.85em; height: 0.85em; border-radius: 3px; flex-shrink: 0;
      }
      .row .nm {
        font-size: clamp(1rem, 1.3vw, 1.3rem); font-weight: 600; flex: 1;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .row .pts {
        font-size: clamp(1.1rem, 1.4vw, 1.5rem); font-weight: 800;
        color: var(--primary); font-variant-numeric: tabular-nums;
      }
      .row.lead .nm { color: var(--gold); }
      .row.lead .pts { color: var(--gold); }
    </style>
  </head>
  <body>
    <div class="stage">
      <header class="bar">
        <div class="meta-l">
          <span class="live">LIVE · DRAWING</span>
          <span style="color:var(--muted)">CH 03 / WARM</span>
        </div>
        <div class="round-id">
          R3 · DRAWING
          <span class="sub">SAUCE · FRANK'S</span>
        </div>
        <div class="meta-r">
          <span style="color:var(--muted)">RUNTIME</span>
          <span style="color:var(--gold)">01:24</span>
        </div>
      </header>

      <main class="main">
        <section class="canvas-frame">
          <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
            <g class="stroke-glow" color="#f97316">
              <path d="M 250 180 L 950 180 L 600 700 Z"
                    stroke="#f97316" stroke-width="10" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <g class="stroke-glow" color="#fbbf24">
              <path d="M 270 180 Q 290 150 320 180 Q 350 150 380 180 Q 410 150 440 180 Q 470 150 500 180 Q 530 150 560 180 Q 590 150 620 180 Q 650 150 680 180 Q 710 150 740 180 Q 770 150 800 180 Q 830 150 860 180 Q 890 150 920 180"
                    stroke="#fbbf24" stroke-width="12" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" />
            </g>
            <g class="stroke-glow" color="#ef4444">
              <circle cx="480" cy="290" r="34" stroke="#ef4444" stroke-width="9" fill="none" />
              <circle cx="700" cy="320" r="34" stroke="#ef4444" stroke-width="9" fill="none" />
              <circle cx="560" cy="450" r="34" stroke="#ef4444" stroke-width="9" fill="none" />
              <path d="M 720 470 a 34 34 0 1 1 -10 -30"
                    stroke="#ef4444" stroke-width="9" fill="none" stroke-linecap="round" />
            </g>
          </svg>
          <div class="crosshair-text">
            STREAM <strong>OK</strong> · SYNC <strong>120ms</strong>
          </div>
        </section>

        <aside class="rail">
          <div class="panel turn-panel">
            <div class="label">On the Wings</div>
            <div class="name">Team Heat</div>
            <div class="meta">
              <div>
                <div class="label">Pending</div>
                <div class="v">+2</div>
              </div>
              <div>
                <div class="label">Drawer</div>
                <div class="v muted">Maria</div>
              </div>
            </div>
          </div>

          <div class="panel timer-panel">
            <span class="label">Turn timer</span>
            <span class="v">1:24</span>
          </div>

          <div class="panel telem-panel">
            <div class="row">
              <span class="k">Strokes</span>
              <span class="v">07 / 60</span>
            </div>
            <div class="row">
              <span class="k">Points</span>
              <span class="v">284 / 500</span>
            </div>
            <div class="row">
              <span class="k">Active color</span>
              <span class="v" style="color:var(--heat)">●&nbsp;Red</span>
            </div>
            <div class="row">
              <span class="k">Brush</span>
              <span class="v">M</span>
            </div>
          </div>
        </aside>
      </main>

    </div>
  </body>
</html>
