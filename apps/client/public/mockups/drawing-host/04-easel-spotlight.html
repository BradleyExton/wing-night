<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawing Host — 04 Spotlight Easel</title>
    <style>
      :root {
        --bg: #121212;
        --surface: #1c1c1c;
        --text: #ffffff;
        --muted: #a3a3a3;
        --primary: #f97316;
        --heat: #ef4444;
        --gold: #fbbf24;
        --board: #0e2624;
        --chalk: #f3eee2;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background:
          radial-gradient(ellipse 70% 55% at 50% 38%, #31180a 0%, #120a06 55%, #040404 100%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        user-select: none;
      }
      .stage {
        height: 100dvh;
        display: grid; grid-template-rows: auto 1fr;
        padding: clamp(0.6rem, 1vw, 1rem);
        gap: 0.6rem;
      }

      /* Hanging marquee sign with bulbs */
      .sign-wrap { display: grid; place-items: center; }
      .sign {
        position: relative;
        background: linear-gradient(180deg, #4a2810 0%, #190b04 100%);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 0.8rem 3.4rem 0.95rem;
        text-align: center;
        box-shadow: 0 0 36px rgba(251,191,36,0.22), 0 10px 22px rgba(0,0,0,0.6);
      }
      .sign .bulbs {
        position: absolute; inset: 7px;
        border-radius: 11px;
        border: 4px dotted rgba(251,191,36,0.55);
        pointer-events: none;
      }
      .sign .label {
        text-transform: uppercase; letter-spacing: 0.34em;
        font-size: 0.68rem; color: var(--gold); font-weight: 800;
      }
      .sign .text {
        font-size: clamp(1.9rem, 3.2vw, 3.2rem);
        font-family: "Georgia", serif; font-weight: 700; font-style: italic;
        margin-top: 0.05rem;
        text-shadow: 0 0 16px rgba(251,191,36,0.4);
      }

      /* Spotlit easel, controls float over the stage floor */
      main.floor {
        position: relative; min-height: 0;
        display: grid; place-items: center;
        padding: 0 clamp(0.5rem, 6vw, 5rem) clamp(3.6rem, 6vh, 4.5rem);
      }
      .spotlight {
        position: absolute; inset: -8% -20% 0;
        background:
          radial-gradient(ellipse 46% 64% at 50% 42%, rgba(251,191,36,0.13) 0%, transparent 70%);
        pointer-events: none;
      }
      .easel {
        position: relative; width: 100%; height: 100%;
        background: linear-gradient(180deg, #5a3318 0%, #2c1808 100%);
        border-radius: 12px; padding: 13px;
        box-shadow: 0 18px 40px rgba(0,0,0,0.65), inset 0 0 0 2px #6a3d1a;
      }
      .easel::before, .easel::after {
        content: ""; position: absolute; top: 100%; width: 14px; height: 52px;
        background: linear-gradient(180deg, #5a3318, #2c1808);
        border-radius: 0 0 4px 4px; box-shadow: inset 0 0 0 1px #6a3d1a;
      }
      .easel::before { left: 16%; transform: rotate(8deg); }
      .easel::after  { right: 16%; transform: rotate(-8deg); }
      .board {
        width: 100%; height: 100%;
        background:
          linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          radial-gradient(ellipse at 50% 30%, #14302d 0%, var(--board) 70%, #06181a 100%);
        background-size: 30px 30px, 30px 30px, 100% 100%;
        border-radius: 6px; position: relative; overflow: hidden;
        box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
      }
      .board svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
      .stroke-soft { filter: drop-shadow(0 0 1.5px rgba(255,255,255,0.4)); }

      /* Floating control clusters */
      .tray {
        position: absolute; left: clamp(0.75rem, 2vw, 1.5rem); bottom: 0.75rem;
        display: flex; align-items: center; gap: 0.6rem;
        background: linear-gradient(180deg, #241307 0%, #120904 100%);
        border: 1px solid #4a2810;
        border-radius: 999px;
        padding: 0.55rem 0.9rem;
        box-shadow: 0 8px 18px rgba(0,0,0,0.5);
      }
      .light {
        width: 44px; height: 44px; border-radius: 50%;
        box-shadow: inset 0 -4px 8px rgba(0,0,0,0.45),
          inset 0 4px 8px rgba(255,255,255,0.18), 0 0 12px currentColor;
        cursor: pointer; border: 2px solid rgba(0,0,0,0.5);
      }
      .light.active { outline: 3px solid var(--gold); outline-offset: 3px; }
      .tray .divider { width: 1px; height: 30px; background: #4a2810; }
      .tray button {
        background: transparent; border: 1px solid #4a2810; color: var(--muted);
        border-radius: 999px; min-height: 44px; padding: 0 1rem;
        font-family: inherit; font-weight: 800; text-transform: uppercase;
        letter-spacing: 0.14em; font-size: 0.72rem; cursor: pointer;
      }
      .tray button:hover { color: var(--gold); border-color: var(--gold); }

      .verdicts {
        position: absolute; right: clamp(0.75rem, 2vw, 1.5rem); bottom: 0.75rem;
        display: flex; align-items: center; gap: 0.7rem;
      }
      .skip {
        background: rgba(0,0,0,0.55); border: 1px solid rgba(251,191,36,0.35);
        color: var(--muted); border-radius: 999px; min-height: 48px;
        padding: 0 1.1rem; font-family: inherit; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.16em; font-size: 0.72rem;
        cursor: pointer;
      }
      .skip:hover { color: var(--gold); border-color: var(--gold); }
      .result-btn {
        border: 2px solid; cursor: pointer; font-family: inherit;
        font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em;
        border-radius: 999px; display: flex; align-items: center; gap: 0.6rem;
        font-size: 1.1rem; min-height: 58px; padding: 0 1.6rem;
        box-shadow: 0 4px 0 rgba(0,0,0,0.45), 0 8px 18px rgba(0,0,0,0.4);
      }
      .result-btn .icon { font-size: 1.5rem; line-height: 1; }
      .result-btn.correct {
        background: radial-gradient(ellipse at top, #2fb86c 0%, #0e6a36 100%);
        color: #061a0c; border-color: #5fe093;
      }
      .result-btn.incorrect {
        background: radial-gradient(ellipse at top, #f04040 0%, #800f0f 100%);
        color: #1c0303; border-color: #ff8a8a;
      }

      /* Timer chip clipped to easel top corner */
      .timer-chip {
        position: absolute; top: -14px; right: 34px;
        background: #0a0604; border: 2px solid var(--primary);
        color: var(--primary); border-radius: 999px;
        font-family: ui-monospace, monospace; font-weight: 800;
        font-variant-numeric: tabular-nums; font-size: 1.05rem;
        padding: 0.35rem 0.9rem;
        box-shadow: 0 6px 14px rgba(0,0,0,0.5);
      }
      .timer-chip .lbl {
        color: var(--muted); font-size: 0.6rem; letter-spacing: 0.2em;
        margin-right: 0.45rem; font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="sign-wrap">
        <div class="sign">
          <span class="bulbs"></span>
          <div class="label">Tonight's Prompt</div>
          <div class="text">Pizza slice</div>
        </div>
      </div>

      <main class="floor">
        <div class="spotlight"></div>
        <div class="easel">
          <div class="timer-chip"><span class="lbl">Turn</span>1:24</div>
          <div class="board">
            <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
              <g class="stroke-soft">
                <path d="M 250 180 L 950 180 L 600 700 Z"
                      stroke="#f3eee2" stroke-width="9" fill="none"
                      stroke-linecap="round" stroke-linejoin="round" />
                <path d="M 270 180 Q 290 150 320 180 Q 350 150 380 180 Q 410 150 440 180 Q 470 150 500 180 Q 530 150 560 180 Q 590 150 620 180 Q 650 150 680 180 Q 710 150 740 180 Q 770 150 800 180 Q 830 150 860 180 Q 890 150 920 180"
                      stroke="#fbbf24" stroke-width="10" fill="none"
                      stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="480" cy="290" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <circle cx="700" cy="320" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <circle cx="560" cy="450" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <path d="M 720 470 a 34 34 0 1 1 -10 -30"
                      stroke="#ef4444" stroke-width="8" fill="none" stroke-linecap="round" />
              </g>
            </svg>
          </div>
        </div>

        <div class="tray">
          <div class="light" style="background:#f3eee2;color:#f3eee2"></div>
          <div class="light active" style="background:#f97316;color:#f97316"></div>
          <div class="light" style="background:#ef4444;color:#ef4444"></div>
          <div class="light" style="background:#fbbf24;color:#fbbf24"></div>
          <div class="light" style="background:#06b6d4;color:#06b6d4"></div>
          <div class="light" style="background:#84cc16;color:#84cc16"></div>
          <div class="divider"></div>
          <button>↶ Undo</button>
          <button>⌫ Clear</button>
        </div>

        <div class="verdicts">
          <button class="skip">Skip →</button>
          <button class="result-btn incorrect"><span class="icon">✗</span><span>Nope</span></button>
          <button class="result-btn correct"><span class="icon">✓</span><span>Correct</span></button>
        </div>
      </main>
    </div>
  </body>
</html>
