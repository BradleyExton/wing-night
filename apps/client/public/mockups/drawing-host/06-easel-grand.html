<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawing Host — 06 Grand Marquee Easel</title>
    <style>
      :root {
        --bg: #121212;
        --surface: #1c1c1c;
        --text: #ffffff;
        --muted: #a3a3a3;
        --primary: #f97316;
        --heat: #ef4444;
        --gold: #fbbf24;
        --board: #0e2624;
        --chalk: #f3eee2;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: radial-gradient(ellipse at top, #2a1306 0%, #0f0a08 60%, #050505 100%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        user-select: none;
      }
      .stage {
        height: 100dvh; display: grid;
        grid-template-rows: auto 1fr auto;
        gap: clamp(0.7rem, 1vw, 1rem);
        padding: clamp(0.7rem, 1vw, 1rem);
      }

      /* Grand marquee: prompt center, score + timer in the frame */
      .marquee {
        position: relative;
        display: grid; grid-template-columns: auto 1fr auto;
        align-items: center; gap: 1.5rem;
        background: linear-gradient(180deg, #3a1d09 0%, #1a0c04 100%);
        border: 2px solid var(--gold);
        border-radius: 14px;
        padding: 0.85rem 1.5rem;
        box-shadow: 0 0 30px rgba(251,191,36,0.18) inset, 0 6px 18px rgba(0,0,0,0.5);
      }
      .marquee .bulbs {
        position: absolute; inset: 6px; border-radius: 10px;
        border: 4px dotted rgba(251,191,36,0.4); pointer-events: none;
      }
      .score-chip {
        font-weight: 800; font-size: 0.78rem;
        text-transform: uppercase; letter-spacing: 0.18em;
        color: var(--gold);
      }
      .score-chip .big { display: block; font-size: 1.5rem; letter-spacing: 0; }
      .prompt { text-align: center; }
      .prompt .label {
        text-transform: uppercase; letter-spacing: 0.32em;
        font-size: 0.7rem; color: var(--gold); font-weight: 800;
      }
      .prompt .text {
        font-size: clamp(1.7rem, 2.8vw, 2.8rem);
        font-family: "Georgia", serif; font-weight: 700; font-style: italic;
        margin-top: 0.1rem;
        text-shadow: 0 0 14px rgba(251,191,36,0.35);
      }
      .timer-block {
        text-align: right;
        font-family: ui-monospace, monospace; font-weight: 800;
        font-size: 1.6rem; color: var(--primary);
        font-variant-numeric: tabular-nums;
      }
      .timer-block .lbl {
        display: block; font-family: inherit;
        color: var(--muted); font-size: 0.6rem; letter-spacing: 0.24em;
        font-weight: 700; text-transform: uppercase;
      }

      main.middle { display: grid; min-height: 0; }
      .easel {
        position: relative; min-height: 0;
        background: linear-gradient(180deg, #5a3318 0%, #2c1808 100%);
        border-radius: 12px; padding: 14px;
        box-shadow: 0 12px 28px rgba(0,0,0,0.55), inset 0 0 0 2px #6a3d1a;
      }
      .board {
        width: 100%; height: 100%;
        background:
          linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          radial-gradient(ellipse at 50% 30%, #14302d 0%, var(--board) 70%, #06181a 100%);
        background-size: 30px 30px, 30px 30px, 100% 100%;
        border-radius: 6px; position: relative; overflow: hidden;
        box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
      }
      .board svg { width: 100%; height: 100%; display: block; }
      .stroke-soft { filter: drop-shadow(0 0 1.5px rgba(255,255,255,0.4)); }
      .tally {
        position: absolute; top: 18px; left: 22px;
        color: rgba(243,238,226,0.5);
        font-family: "Georgia", serif; font-style: italic;
        font-size: 0.85rem;
      }

      /* Chalk-stick palette + footer dock */
      footer.foot {
        display: grid;
        grid-template-columns: auto auto 1fr auto auto auto;
        align-items: center; gap: clamp(0.75rem, 1.2vw, 1.25rem);
        background: linear-gradient(180deg, #1a0e05 0%, #0a0604 100%);
        border: 1px solid #3a200d;
        border-radius: 14px;
        padding: 0.75rem 1.25rem;
      }
      .chalks { display: flex; gap: 0.55rem; align-items: flex-end; }
      .chalk-stick {
        width: 30px; height: 46px; border-radius: 6px 6px 4px 4px;
        cursor: pointer; position: relative;
        box-shadow: inset -4px 0 6px rgba(0,0,0,0.3),
          inset 3px 2px 5px rgba(255,255,255,0.25), 0 3px 6px rgba(0,0,0,0.4);
      }
      .chalk-stick.active {
        height: 56px;
        outline: 3px solid var(--gold); outline-offset: 3px;
      }
      .util { display: flex; gap: 0.5rem; }
      .util button {
        background: var(--surface); border: 1px solid #3a200d;
        color: var(--text); border-radius: 10px; min-height: 48px;
        font-family: inherit; font-weight: 800; cursor: pointer;
        padding: 0 1rem; text-transform: uppercase;
        letter-spacing: 0.16em; font-size: 0.78rem;
      }
      .util button:hover { border-color: var(--gold); color: var(--gold); }
      .skip {
        background: transparent; border: 1px solid rgba(251,191,36,0.35);
        color: var(--muted); border-radius: 999px; min-height: 48px;
        padding: 0 1.1rem; font-family: inherit; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.16em; font-size: 0.72rem;
        cursor: pointer;
      }
      .skip:hover { color: var(--gold); border-color: var(--gold); }
      .result-btn {
        border: 2px solid; cursor: pointer; font-family: inherit;
        font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em;
        border-radius: 12px; display: flex; align-items: center; gap: 0.65rem;
        font-size: 1.05rem; min-height: 56px; padding: 0 1.4rem;
        box-shadow: 0 4px 0 rgba(0,0,0,0.45), 0 6px 14px rgba(0,0,0,0.35);
      }
      .result-btn .icon { font-size: 1.5rem; line-height: 1; }
      .result-btn.correct {
        background: radial-gradient(ellipse at top, #2fb86c 0%, #0e6a36 100%);
        color: #061a0c; border-color: #5fe093;
      }
      .result-btn.incorrect {
        background: radial-gradient(ellipse at top, #f04040 0%, #800f0f 100%);
        color: #1c0303; border-color: #ff8a8a;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="marquee">
        <span class="bulbs"></span>
        <div class="score-chip">Team Heat<span class="big">+2</span></div>
        <div class="prompt">
          <div class="label">★ Tonight's Prompt ★</div>
          <div class="text">Pizza slice</div>
        </div>
        <div class="timer-block"><span class="lbl">Turn</span>1:24</div>
      </div>

      <main class="middle">
        <div class="easel">
          <div class="board">
            <span class="tally">stroke 7 of 60</span>
            <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
              <g class="stroke-soft">
                <path d="M 250 180 L 950 180 L 600 700 Z"
                      stroke="#f3eee2" stroke-width="9" fill="none"
                      stroke-linecap="round" stroke-linejoin="round" />
                <path d="M 270 180 Q 290 150 320 180 Q 350 150 380 180 Q 410 150 440 180 Q 470 150 500 180 Q 530 150 560 180 Q 590 150 620 180 Q 650 150 680 180 Q 710 150 740 180 Q 770 150 800 180 Q 830 150 860 180 Q 890 150 920 180"
                      stroke="#fbbf24" stroke-width="10" fill="none"
                      stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="480" cy="290" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <circle cx="700" cy="320" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <circle cx="560" cy="450" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <path d="M 720 470 a 34 34 0 1 1 -10 -30"
                      stroke="#ef4444" stroke-width="8" fill="none" stroke-linecap="round" />
              </g>
            </svg>
          </div>
        </div>
      </main>

      <footer class="foot">
        <div class="chalks">
          <div class="chalk-stick" style="background:#f3eee2"></div>
          <div class="chalk-stick active" style="background:#f97316"></div>
          <div class="chalk-stick" style="background:#ef4444"></div>
          <div class="chalk-stick" style="background:#fbbf24"></div>
          <div class="chalk-stick" style="background:#06b6d4"></div>
          <div class="chalk-stick" style="background:#84cc16"></div>
        </div>
        <div class="util">
          <button>↶ Undo</button>
          <button>⌫ Clear</button>
        </div>
        <div></div>
        <button class="skip">Skip →</button>
        <button class="result-btn incorrect"><span class="icon">✗</span><span>Nope</span></button>
        <button class="result-btn correct"><span class="icon">✓</span><span>Correct</span></button>
      </footer>
    </div>
  </body>
</html>
