<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawing Host — 05 Easel + Control Deck</title>
    <style>
      :root {
        --bg: #121212;
        --surface: #1c1c1c;
        --surface-alt: #242424;
        --text: #ffffff;
        --muted: #a3a3a3;
        --primary: #f97316;
        --heat: #ef4444;
        --gold: #fbbf24;
        --teamA: #f97316;
        --board: #0e2624;
        --chalk: #f3eee2;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: radial-gradient(ellipse at top, #2a1306 0%, #0f0a08 60%, #050505 100%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        user-select: none;
      }
      .stage {
        height: 100dvh;
        display: grid; grid-template-rows: auto 1fr;
        gap: 0.6rem;
        padding: clamp(0.6rem, 1vw, 1rem);
      }

      /* Mini-rail: matches host shell anatomy (§2.0A) */
      .mini-rail {
        display: flex; align-items: center; gap: 1rem;
        padding: 0.35rem 0.5rem;
        font-size: 0.74rem; font-weight: 800;
        text-transform: uppercase; letter-spacing: 0.22em;
        color: var(--muted);
      }
      .mini-rail .round { color: var(--primary); }
      .mini-rail .pill {
        display: inline-flex; align-items: center; gap: 0.45rem;
        color: var(--text);
      }
      .mini-rail .dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--teamA); box-shadow: 0 0 8px var(--teamA);
      }
      .mini-rail .timer {
        margin-left: auto;
        font-family: ui-monospace, monospace; font-size: 1.05rem;
        color: var(--primary); font-variant-numeric: tabular-nums;
        letter-spacing: 0;
      }

      main.middle {
        display: grid;
        grid-template-columns: 1fr clamp(240px, 24vw, 330px);
        gap: clamp(0.7rem, 1.2vw, 1.2rem);
        min-height: 0;
      }

      .easel {
        position: relative; min-height: 0;
        background: linear-gradient(180deg, #5a3318 0%, #2c1808 100%);
        border-radius: 12px; padding: 13px;
        box-shadow: 0 12px 28px rgba(0,0,0,0.55), inset 0 0 0 2px #6a3d1a;
      }
      .board {
        width: 100%; height: 100%;
        background:
          linear-gradient(0deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
          radial-gradient(ellipse at 50% 30%, #14302d 0%, var(--board) 70%, #06181a 100%);
        background-size: 30px 30px, 30px 30px, 100% 100%;
        border-radius: 6px; position: relative; overflow: hidden;
        box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
      }
      .board svg { width: 100%; height: 100%; display: block; }
      .stroke-soft { filter: drop-shadow(0 0 1.5px rgba(255,255,255,0.4)); }

      /* Control deck column */
      aside.deck {
        display: flex; flex-direction: column; gap: 0.7rem; min-height: 0;
      }
      .prompt-card {
        background: linear-gradient(180deg, #3a1d09 0%, #1a0c04 100%);
        border: 2px solid var(--gold); border-radius: 14px;
        padding: 0.8rem 1rem; text-align: center;
        box-shadow: 0 0 24px rgba(251,191,36,0.16) inset;
      }
      .prompt-card .label {
        text-transform: uppercase; letter-spacing: 0.3em;
        font-size: 0.62rem; color: var(--gold); font-weight: 800;
      }
      .prompt-card .text {
        font-family: "Georgia", serif; font-style: italic; font-weight: 700;
        font-size: clamp(1.4rem, 2vw, 2rem);
        text-shadow: 0 0 12px rgba(251,191,36,0.35);
      }
      .verdict {
        flex: 1; min-height: 76px;
        border: 2px solid; border-radius: 14px; cursor: pointer;
        display: grid; place-items: center; align-content: center; gap: 0.3rem;
        font-family: inherit; font-weight: 900; text-transform: uppercase;
        letter-spacing: 0.1em; font-size: 1.15rem;
        box-shadow: 0 4px 0 rgba(0,0,0,0.45), 0 6px 14px rgba(0,0,0,0.35);
      }
      .verdict .icon { font-size: 1.9rem; line-height: 1; }
      .verdict .sub { font-size: 0.62rem; letter-spacing: 0.24em; opacity: 0.8; }
      .verdict.correct {
        background: radial-gradient(ellipse at top, #2fb86c 0%, #0e6a36 100%);
        color: #061a0c; border-color: #5fe093;
      }
      .verdict.incorrect {
        background: radial-gradient(ellipse at top, #f04040 0%, #800f0f 100%);
        color: #1c0303; border-color: #ff8a8a;
      }
      .deck-rows { display: flex; gap: 0.5rem; }
      .deck-rows button {
        flex: 1; background: var(--surface); border: 1px solid #3a200d;
        color: var(--text); border-radius: 10px; min-height: 48px;
        font-family: inherit; font-weight: 800; cursor: pointer;
        text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.72rem;
      }
      .deck-rows button:hover { border-color: var(--gold); color: var(--gold); }
      .palette-grid {
        display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.5rem;
        background: linear-gradient(180deg, #1a0e05 0%, #0a0604 100%);
        border: 1px solid #3a200d; border-radius: 14px;
        padding: 0.7rem;
      }
      .light {
        aspect-ratio: 1; border-radius: 50%; width: 100%;
        box-shadow: inset 0 -4px 8px rgba(0,0,0,0.45),
          inset 0 4px 8px rgba(255,255,255,0.18), 0 0 12px currentColor;
        cursor: pointer; border: 2px solid rgba(0,0,0,0.5);
      }
      .light.active { outline: 3px solid var(--gold); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="mini-rail">
        <span class="round">Round 3</span>
        <span>Ghost Pepper</span>
        <span>Drawing</span>
        <span class="pill"><span class="dot"></span>Team Heat · +2 pending</span>
        <span class="timer">1:24</span>
      </div>

      <main class="middle">
        <div class="easel">
          <div class="board">
            <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
              <g class="stroke-soft">
                <path d="M 250 180 L 950 180 L 600 700 Z"
                      stroke="#f3eee2" stroke-width="9" fill="none"
                      stroke-linecap="round" stroke-linejoin="round" />
                <path d="M 270 180 Q 290 150 320 180 Q 350 150 380 180 Q 410 150 440 180 Q 470 150 500 180 Q 530 150 560 180 Q 590 150 620 180 Q 650 150 680 180 Q 710 150 740 180 Q 770 150 800 180 Q 830 150 860 180 Q 890 150 920 180"
                      stroke="#fbbf24" stroke-width="10" fill="none"
                      stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="480" cy="290" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <circle cx="700" cy="320" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <circle cx="560" cy="450" r="34" stroke="#ef4444" stroke-width="8" fill="none" />
                <path d="M 720 470 a 34 34 0 1 1 -10 -30"
                      stroke="#ef4444" stroke-width="8" fill="none" stroke-linecap="round" />
              </g>
            </svg>
          </div>
        </div>

        <aside class="deck">
          <div class="prompt-card">
            <div class="label">★ Tonight's Prompt ★</div>
            <div class="text">Pizza slice</div>
          </div>
          <button class="verdict correct">
            <span class="icon">✓</span>
            <span>Correct</span>
            <span class="sub">+1 point</span>
          </button>
          <button class="verdict incorrect">
            <span class="icon">✗</span>
            <span>Nope</span>
            <span class="sub">no points</span>
          </button>
          <div class="deck-rows">
            <button>↶ Undo</button>
            <button>⌫ Clear</button>
            <button>Skip →</button>
          </div>
          <div class="palette-grid">
            <div class="light" style="background:#f3eee2;color:#f3eee2"></div>
            <div class="light active" style="background:#f97316;color:#f97316"></div>
            <div class="light" style="background:#ef4444;color:#ef4444"></div>
            <div class="light" style="background:#fbbf24;color:#fbbf24"></div>
            <div class="light" style="background:#06b6d4;color:#06b6d4"></div>
            <div class="light" style="background:#84cc16;color:#84cc16"></div>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
