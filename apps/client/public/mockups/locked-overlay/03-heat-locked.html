<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameLockedOverlay — 03 Heat Locked</title>
    <style>
      :root {
        --bg: #0a0606; --text: #fff; --muted: #6b6157; --muted2: #b3a89a;
        --primary: #f97316; --heat: #ef4444; --gold: #fbbf24; --ember: #ffb35a;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      .behind {
        position: fixed; inset: 0; z-index: 0; opacity: 0.4;
        background:
          radial-gradient(ellipse 70% 60% at 50% 80%, rgba(249, 115, 22, 0.30) 0%, transparent 60%),
          radial-gradient(ellipse 50% 40% at 50% 100%, rgba(239, 68, 68, 0.28) 0%, transparent 55%);
      }

      .overlay {
        position: fixed; inset: 0; z-index: 30;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(10, 6, 6, 0.78);
        backdrop-filter: blur(12px);
        padding: clamp(1.5rem, 3vw, 3rem);
        gap: clamp(1.5rem, 3vw, 2.5rem);
      }

      /* Lock icon with rotating glow ring */
      .lock-frame {
        position: relative;
        display: flex; align-items: center; justify-content: center;
        width: clamp(140px, 18vw, 230px);
        height: clamp(140px, 18vw, 230px);
      }
      .lock-frame::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: 50%;
        background: conic-gradient(from 0deg, transparent 0deg, rgba(251, 191, 36, 0.7) 60deg, transparent 120deg, transparent 360deg);
        animation: spin 4s linear infinite;
        filter: blur(2px);
      }
      .lock-frame::after {
        content: "";
        position: absolute; inset: 8px;
        border-radius: 50%;
        background: rgba(10, 6, 6, 0.95);
        border: 1px solid rgba(251, 191, 36, 0.35);
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .lock-icon {
        position: relative;
        width: 60%; height: 60%;
        color: var(--gold);
        filter: drop-shadow(0 0 16px rgba(251, 191, 36, 0.7));
        z-index: 1;
      }
      .lock-icon svg { width: 100%; height: 100%; }

      .heading {
        margin: 0;
        font-size: clamp(3rem, 8vw, 10rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.01em;
        line-height: 0.85;
        color: #fff;
        text-shadow:
          0 0 40px rgba(251, 191, 36, 0.45),
          0 0 100px rgba(249, 115, 22, 0.25);
      }
      .heading .accent { color: var(--gold); }

      /* Countdown circled by animated heat ring */
      .countdown-frame {
        position: relative;
        display: flex; align-items: center; justify-content: center;
        width: clamp(220px, 28vw, 360px);
        height: clamp(220px, 28vw, 360px);
      }
      .countdown-frame::before {
        content: "";
        position: absolute; inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        background:
          conic-gradient(from -90deg, var(--gold) 0deg, var(--primary) 120deg, var(--heat) 240deg, var(--gold) 360deg) border-box;
        -webkit-mask:
          linear-gradient(#000 0 0) padding-box,
          linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
        padding: 4px;
        animation: spin 6s linear infinite;
        filter: drop-shadow(0 0 14px rgba(249, 115, 22, 0.55));
      }
      .countdown {
        position: relative;
        font-family: ui-monospace, "Menlo", "Consolas", monospace;
        font-size: clamp(8rem, 18vw, 16rem);
        font-weight: 900;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.05em;
        line-height: 1;
        color: var(--primary);
        text-shadow:
          0 0 50px rgba(249, 115, 22, 0.6),
          0 0 120px rgba(249, 115, 22, 0.3);
        animation: tick 1s ease-out infinite;
        z-index: 1;
      }
      @keyframes tick {
        0%   { transform: scale(1); }
        15%  { transform: scale(1.1); }
        50%  { transform: scale(1); }
        100% { transform: scale(1); }
      }

      .footer-line {
        text-transform: uppercase; letter-spacing: 0.32em;
        font-size: clamp(0.95rem, 1.2vw, 1.4rem);
        font-weight: 800; color: var(--gold);
      }
      .footer-line .label { color: var(--muted2); margin-right: 0.5em; }

      @media (prefers-reduced-motion: reduce) {
        .lock-frame::before, .countdown-frame::before { animation: none; }
        .countdown { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="behind"></div>
    <div class="overlay">
      <div class="lock-frame">
        <span class="lock-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
      </div>
      <h2 class="heading">Locked <span class="accent">In</span></h2>
      <div class="countdown-frame">
        <p class="countdown" id="num">3</p>
      </div>
      <p class="footer-line"><span class="label">Round 1 starts in</span><span id="word">three</span></p>
    </div>
    <script>
      const num = document.getElementById('num');
      const word = document.getElementById('word');
      const words = { 1: 'one', 2: 'two', 3: 'three' };
      let n = 3;
      setInterval(() => {
        n = n > 1 ? n - 1 : 3;
        num.textContent = n;
        word.textContent = words[n];
      }, 1000);
    </script>
  </body>
</html>
