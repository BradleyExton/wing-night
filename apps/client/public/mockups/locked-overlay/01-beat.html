<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameLockedOverlay — 01 Beat Reveal</title>
    <style>
      :root {
        --bg: #0a0606; --text: #fff; --muted: #6b6157; --muted2: #b3a89a;
        --primary: #f97316; --heat: #ef4444; --gold: #fbbf24; --ember: #ffb35a;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      /* Faint Cinematic Inferno backdrop (simulating the SETUP showing through) */
      .behind {
        position: fixed; inset: 0; z-index: 0; opacity: 0.35;
        background:
          radial-gradient(ellipse 70% 60% at 50% 80%, rgba(249, 115, 22, 0.25) 0%, transparent 60%),
          radial-gradient(ellipse 50% 40% at 50% 100%, rgba(239, 68, 68, 0.22) 0%, transparent 55%);
      }

      /* The overlay itself */
      .overlay {
        position: fixed; inset: 0; z-index: 30;
        display: flex; align-items: center; justify-content: center;
        background: rgba(10, 6, 6, 0.78);
        backdrop-filter: blur(12px);
        padding: clamp(1.5rem, 3vw, 3rem);
      }

      .panel {
        display: flex; flex-direction: column; align-items: center;
        gap: clamp(1rem, 2vw, 2rem);
        text-align: center;
        max-width: 1100px;
      }

      .beat {
        opacity: 0;
        animation: reveal 600ms ease forwards;
      }
      .beat.one   { animation-delay: 100ms; }
      .beat.two   { animation-delay: 700ms; }
      .beat.three { animation-delay: 1500ms; }
      @keyframes reveal {
        from { opacity: 0; transform: translateY(0.6rem); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .eyebrow {
        text-transform: uppercase; letter-spacing: 0.42em;
        font-size: clamp(0.95rem, 1.3vw, 1.5rem);
        font-weight: 800; color: var(--muted2);
        display: inline-flex; align-items: center; gap: 0.7em;
      }
      .eyebrow .dot {
        width: 0.7em; height: 0.7em; border-radius: 50%;
        background: var(--primary);
        box-shadow: 0 0 12px var(--primary), 0 0 24px rgba(249, 115, 22, 0.6);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.45; transform: scale(0.85); }
      }

      .heading {
        margin: 0;
        font-size: clamp(4rem, 11vw, 14rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        line-height: 0.85;
        color: #fff;
        text-shadow:
          0 0 40px rgba(251, 191, 36, 0.35),
          0 0 100px rgba(249, 115, 22, 0.25);
      }
      .heading .accent { color: var(--primary); }

      .countdown {
        display: inline-flex; align-items: baseline; gap: 0.4em;
        margin-top: clamp(0.25rem, 0.5vw, 0.75rem);
      }
      .countdown .label {
        font-size: clamp(0.95rem, 1.2vw, 1.4rem);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.42em;
        color: var(--muted2);
        margin-right: 0.5em;
        align-self: center;
      }
      .countdown .num {
        font-family: ui-monospace, "Menlo", "Consolas", monospace;
        font-size: clamp(7rem, 18vw, 22rem);
        font-weight: 900;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.08em;
        line-height: 0.85;
        color: var(--primary);
        text-shadow:
          0 0 60px rgba(249, 115, 22, 0.45),
          0 0 140px rgba(249, 115, 22, 0.25);
        animation: tick 1s ease-out infinite;
      }
      @keyframes tick {
        0%   { transform: scale(1); }
        20%  { transform: scale(1.1); }
        50%  { transform: scale(1); }
        100% { transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .beat { animation: none; opacity: 1; transform: none; }
        .countdown .num { animation: none; }
        .eyebrow .dot { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="behind"></div>
    <div class="overlay">
      <div class="panel">
        <span class="beat one eyebrow"><span class="dot"></span>Stand by</span>
        <h2 class="beat two heading">Locked <span class="accent">In</span></h2>
        <p class="beat three countdown">
          <span class="label">Starting in</span><span class="num" id="num">3</span>
        </p>
      </div>
    </div>
    <script>
      const num = document.getElementById('num');
      let n = 3;
      setInterval(() => {
        n = n > 1 ? n - 1 : 3;
        num.textContent = n;
      }, 1000);
    </script>
  </body>
</html>
