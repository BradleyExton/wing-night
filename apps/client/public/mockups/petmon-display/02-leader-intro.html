<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PETMON Display — 02 Gym Leader Intro (MINIGAME_INTRO)</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #121212;
        --muted: #a3a3a3;
        --team-a: #f97316;
        --dmg-0: #0f380f;
        --dmg-1: #306230;
        --dmg-2: #8bac0f;
        --dmg-3: #9bbc0f;
        --screen-h: min(82dvh, 78vw);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: radial-gradient(ellipse 70% 60% at 50% 42%, #1a1f12 0%, var(--bg) 60%, #0a0a0a 100%);
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        user-select: none;
      }
      .stage {
        height: 100dvh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.1rem;
      }
      .context { display: flex; gap: 1rem; align-items: center; }
      .chip {
        background: rgba(18, 18, 18, 0.85);
        border: 1px solid #333; border-radius: 999px;
        padding: 0.45rem 1.1rem;
        font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
        font-size: clamp(0.7rem, 1vw, 1rem); color: var(--muted);
      }
      .chip.team { color: #fff; border-color: rgba(249, 115, 22, 0.55); }
      .chip.team::before {
        content: ""; display: inline-block; width: 0.6em; height: 0.6em;
        border-radius: 50%; background: var(--team-a); margin-right: 0.55em;
      }

      .bezel {
        background: #1c1c1c; border: 1px solid #2e2e2e; border-radius: 18px;
        padding: clamp(10px, 1.4vh, 18px);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.65), 0 0 90px rgba(139, 172, 15, 0.12);
      }
      .screen {
        position: relative; overflow: hidden;
        height: var(--screen-h); aspect-ratio: 10 / 9;
        background: var(--dmg-3);
        border-radius: 6px;
        font-family: "Press Start 2P", ui-monospace, monospace;
        font-size: calc(var(--screen-h) / 24);
        color: var(--dmg-0); line-height: 1.5;
        text-transform: uppercase;
      }
      .lcd {
        position: absolute; inset: 0; pointer-events: none; z-index: 9;
        background:
          repeating-linear-gradient(0deg, rgba(15, 56, 15, 0.05) 0 1px, transparent 1px 3px),
          repeating-linear-gradient(90deg, rgba(15, 56, 15, 0.05) 0 1px, transparent 1px 3px);
      }

      .kicker {
        position: absolute; top: 7%; left: 7%; font-size: 0.75em;
        border-bottom: 3px solid var(--dmg-0); padding-bottom: 0.8em;
        letter-spacing: 0.08em;
      }
      .gymname { position: absolute; top: 16%; left: 7%; font-size: 1.15em; width: 50%; }
      .bench { position: absolute; top: 33%; left: 7%; font-size: 0.9em; letter-spacing: 0.45em; }

      .slot {
        position: absolute; right: 5%; top: 8%;
        width: 44%; aspect-ratio: 1; overflow: hidden;
      }
      .slot canvas {
        width: 100%; height: 100%; image-rendering: pixelated; display: block;
        animation: slidein 0.6s steps(8, end) both;
      }
      @keyframes slidein {
        from { transform: translateX(110%); }
        to { transform: translateX(0); }
      }

      .textbox {
        position: absolute; left: 2.5%; right: 2.5%; bottom: 3%; height: 26%;
        background: var(--dmg-3); z-index: 5;
        border: 3px solid var(--dmg-0); border-radius: 4px;
        box-shadow: inset 0 0 0 2px var(--dmg-3), inset 0 0 0 4px var(--dmg-0);
        padding: 1em 0.9em;
      }
      .cursor {
        position: absolute; right: 0.9em; bottom: 0.5em;
        animation: bob 0.7s steps(2, jump-none) infinite;
        opacity: 0;
      }
      .cursor.on { opacity: 1; }
      @keyframes bob { 50% { transform: translateY(0.18em); } }

      .hintline { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.06em; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="context">
        <span class="chip">Round 2 · Petmon Gym</span>
        <span class="chip team">Scorched Earth</span>
      </div>
      <div class="bezel">
        <div class="screen">
          <div class="kicker">Gym 2 — The Dog Park</div>
          <div class="gymname">GYM LEADER MATT</div>
          <div class="bench">●●</div>
          <div class="slot"><canvas id="leaderSprite"></canvas></div>
          <div class="textbox">
            <span id="text"></span>
            <span class="cursor" id="cursor">▼</span>
          </div>
          <div class="lcd"></div>
        </div>
      </div>
      <div class="hintline">
        MINIGAME_INTRO state — the leader sprite is a dithered photo of the actual friend.
      </div>
    </div>

    <script>
      /* same dither pipeline as 01 — placeholder bust standing in for a real photo */
      const DMG = ["#0f380f", "#306230", "#8bac0f", "#9bbc0f"];
      const BAYER = [[0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]];

      function ditherSprite(canvas, size, painter) {
        canvas.width = canvas.height = size;
        const g = canvas.getContext("2d");
        g.clearRect(0, 0, size, size);
        painter(g, size);
        const img = g.getImageData(0, 0, size, size);
        const d = img.data;
        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const i = (y * size + x) * 4;
            if (d[i + 3] < 120) { d[i + 3] = 0; continue; }
            const lum = (0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]) / 255;
            const noise = (BAYER[y % 4][x % 4] / 16 - 0.5) * 0.55;
            const level = Math.max(0, Math.min(3, Math.floor((lum + noise) * 3.6)));
            const hex = DMG[level];
            d[i] = parseInt(hex.slice(1, 3), 16);
            d[i + 1] = parseInt(hex.slice(3, 5), 16);
            d[i + 2] = parseInt(hex.slice(5, 7), 16);
            d[i + 3] = 255;
          }
        }
        g.putImageData(img, 0, 0);
      }

      function paintLeader(g, s) {
        const u = s / 32;
        /* cap */
        g.fillStyle = "#3c3c3c";
        g.beginPath(); g.ellipse(16 * u, 8.5 * u, 7 * u, 5 * u, 0, Math.PI, 0); g.fill();
        g.fillRect(9 * u, 8 * u, 14 * u, 1.6 * u);
        g.fillStyle = "#2c2c2c";
        g.fillRect(7.5 * u, 9.2 * u, 10 * u, 1.4 * u); /* brim */
        /* face */
        const face = g.createRadialGradient(14 * u, 12 * u, 2 * u, 16 * u, 14 * u, 7 * u);
        face.addColorStop(0, "#ededed");
        face.addColorStop(1, "#8a8a8a");
        g.fillStyle = face;
        g.beginPath(); g.ellipse(16 * u, 14 * u, 5.5 * u, 5 * u, 0, 0, Math.PI * 2); g.fill();
        g.fillStyle = "#161616"; /* eyes */
        g.fillRect(13.4 * u, 13 * u, 1.6 * u, 1.6 * u);
        g.fillRect(17.4 * u, 13 * u, 1.6 * u, 1.6 * u);
        /* jacket shoulders */
        const jacket = g.createLinearGradient(0, 19 * u, 0, 32 * u);
        jacket.addColorStop(0, "#bdbdbd");
        jacket.addColorStop(1, "#4a4a4a");
        g.fillStyle = jacket;
        g.beginPath();
        g.moveTo(5 * u, 32 * u); g.lineTo(8 * u, 20 * u); g.lineTo(13 * u, 18.5 * u);
        g.lineTo(19 * u, 18.5 * u); g.lineTo(24 * u, 20 * u); g.lineTo(27 * u, 32 * u);
        g.closePath(); g.fill();
        g.fillStyle = "#2e2e2e"; /* collar V */
        g.beginPath();
        g.moveTo(13 * u, 19 * u); g.lineTo(16 * u, 24 * u); g.lineTo(19 * u, 19 * u);
        g.closePath(); g.fill();
      }

      ditherSprite(document.getElementById("leaderSprite"), 160, paintLeader);

      /* looping intro text */
      const textEl = document.getElementById("text");
      const cursorEl = document.getElementById("cursor");
      const lines = [
        "GYM LEADER MATT wants to battle!",
        "MATT: my dogs don't lose to amateurs.",
        "Pick your three PETMON!"
      ];
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      async function run() {
        for (;;) {
          for (const line of lines) {
            textEl.textContent = "";
            cursorEl.classList.remove("on");
            for (const ch of line) {
              textEl.textContent += ch;
              await sleep(26);
            }
            cursorEl.classList.add("on");
            await sleep(2100);
          }
        }
      }
      run();
    </script>
  </body>
</html>
