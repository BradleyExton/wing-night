<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PETMON Display — 01 Gym Battle (auto-playing demo)</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #121212;
        --muted: #a3a3a3;
        --team-a: #f97316;
        /* DMG green ramp — darkest ink to lightest screen */
        --dmg-0: #0f380f;
        --dmg-1: #306230;
        --dmg-2: #8bac0f;
        --dmg-3: #9bbc0f;
        --screen-h: min(82dvh, 78vw);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: radial-gradient(ellipse 70% 60% at 50% 42%, #1a1f12 0%, var(--bg) 60%, #0a0a0a 100%);
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        user-select: none;
      }
      .stage {
        height: 100dvh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1.1rem;
      }
      .context {
        display: flex; gap: 1rem; align-items: center;
      }
      .chip {
        background: rgba(18, 18, 18, 0.85);
        border: 1px solid #333; border-radius: 999px;
        padding: 0.45rem 1.1rem;
        font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
        font-size: clamp(0.7rem, 1vw, 1rem); color: var(--muted);
      }
      .chip.team {
        color: #fff; border-color: rgba(249, 115, 22, 0.55);
      }
      .chip.team::before {
        content: ""; display: inline-block; width: 0.6em; height: 0.6em;
        border-radius: 50%; background: var(--team-a); margin-right: 0.55em;
      }

      .bezel {
        background: #1c1c1c; border: 1px solid #2e2e2e; border-radius: 18px;
        padding: clamp(10px, 1.4vh, 18px);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.65), 0 0 90px rgba(139, 172, 15, 0.12);
      }
      .screen {
        position: relative; overflow: hidden;
        height: var(--screen-h); aspect-ratio: 10 / 9;
        background: var(--dmg-3);
        border-radius: 6px;
        font-family: "Press Start 2P", ui-monospace, monospace;
        font-size: calc(var(--screen-h) / 24);
        color: var(--dmg-0); line-height: 1.45;
        text-transform: uppercase;
      }
      .lcd {
        position: absolute; inset: 0; pointer-events: none; z-index: 9;
        background:
          repeating-linear-gradient(0deg, rgba(15, 56, 15, 0.05) 0 1px, transparent 1px 3px),
          repeating-linear-gradient(90deg, rgba(15, 56, 15, 0.05) 0 1px, transparent 1px 3px);
      }

      /* ---- info panels, Red/Blue layout ---- */
      .info { position: absolute; z-index: 3; }
      .info .name { font-size: 1em; white-space: nowrap; }
      .hp-row { display: flex; align-items: center; gap: 0.4em; margin-top: 0.55em; }
      .hp-label { font-size: 0.62em; letter-spacing: 0; }
      .hp-frame {
        flex: 1; height: 0.5em; border: 2px solid var(--dmg-0);
        border-radius: 999px; padding: 1px; background: var(--dmg-3);
      }
      .hp-fill {
        height: 100%; width: 100%; border-radius: 999px; background: var(--dmg-1);
        transition: width 0.9s steps(14, end);
      }
      .bench { margin-top: 0.5em; font-size: 0.8em; letter-spacing: 0.4em; }
      .enemy-info { top: 5%; left: 5%; width: 46%; border-bottom: 3px solid var(--dmg-0); padding-bottom: 0.7em; }
      .enemy-info::after {
        content: ""; position: absolute; right: -3px; bottom: -3px;
        width: 3px; height: 1.2em; background: var(--dmg-0);
      }
      .player-info { bottom: 31%; right: 5%; width: 48%; border-bottom: 3px solid var(--dmg-0); padding-bottom: 0.7em; }
      .player-info::after {
        content: ""; position: absolute; left: -3px; bottom: -3px;
        width: 3px; height: 1.2em; background: var(--dmg-0);
      }
      .hp-num { margin-top: 0.45em; text-align: right; font-size: 0.78em; }

      /* ---- sprites ---- */
      .slot { position: absolute; overflow: hidden; z-index: 2; }
      .slot.enemy { top: 3%; right: 6%; width: 30%; aspect-ratio: 1; }
      .slot.player { bottom: 27.5%; left: 6%; width: 34%; aspect-ratio: 1; }
      .slot canvas {
        width: 100%; height: 100%; image-rendering: pixelated; display: block;
        transition: transform 0.55s steps(8, end), opacity 0.1s linear 0.5s;
      }
      .slot.fainted canvas { transform: translateY(105%); opacity: 0; }
      .slot.entering canvas { animation: sendout 0.5s steps(6, end) both; }
      @keyframes sendout {
        from { transform: translateY(20%) scale(0.2); }
        to { transform: translateY(0) scale(1); }
      }
      .hitflash { animation: blink 0.35s steps(2, jump-none) 2; }
      @keyframes blink { 50% { opacity: 0; } }

      /* ---- text box ---- */
      .textbox {
        position: absolute; left: 2.5%; right: 2.5%; bottom: 3%; height: 22%;
        background: var(--dmg-3); z-index: 5;
        border: 3px solid var(--dmg-0); border-radius: 4px;
        box-shadow: inset 0 0 0 2px var(--dmg-3), inset 0 0 0 4px var(--dmg-0);
        padding: 1em 0.9em;
      }
      .cursor {
        position: absolute; right: 0.9em; bottom: 0.5em;
        animation: bob 0.7s steps(2, jump-none) infinite;
        opacity: 0;
      }
      .cursor.on { opacity: 1; }
      @keyframes bob { 50% { transform: translateY(0.18em); } }

      /* ---- move menu (overlays right of textbox) ---- */
      .menu {
        position: absolute; right: 2.5%; bottom: 3%; width: 62%; height: 34%;
        background: var(--dmg-3); z-index: 6; display: none;
        border: 3px solid var(--dmg-0); border-radius: 4px;
        box-shadow: inset 0 0 0 2px var(--dmg-3), inset 0 0 0 4px var(--dmg-0);
        padding: 0.9em 0.6em;
        grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
        align-items: center; font-size: 0.82em;
      }
      .menu.on { display: grid; }
      .menu .m { white-space: nowrap; padding-left: 1.1em; position: relative; }
      .menu .m.sel::before { content: "▶"; position: absolute; left: 0; }

      .hintline { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.06em; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="context">
        <span class="chip">Round 2 · Petmon Gym</span>
        <span class="chip team">Scorched Earth</span>
      </div>
      <div class="bezel">
        <div class="screen">
          <div class="info enemy-info">
            <div class="name">BISCUIT</div>
            <div class="hp-row">
              <span class="hp-label">HP:</span>
              <div class="hp-frame"><div class="hp-fill" id="enemyHp"></div></div>
            </div>
            <div class="bench" id="enemyBench">●●</div>
          </div>
          <div class="slot enemy" id="enemySlot"><canvas id="enemySprite"></canvas></div>
          <div class="slot player" id="playerSlot"><canvas id="playerSprite"></canvas></div>
          <div class="info player-info">
            <div class="name" id="playerName">MAPLE</div>
            <div class="hp-row">
              <span class="hp-label">HP:</span>
              <div class="hp-frame"><div class="hp-fill" id="playerHp"></div></div>
            </div>
            <div class="hp-num" id="playerHpNum">31/ 31</div>
            <div class="bench">●●●</div>
          </div>
          <div class="textbox">
            <span id="text"></span>
            <span class="cursor" id="cursor">▼</span>
          </div>
          <div class="menu" id="menu">
            <div class="m" data-i="0">ZOOMIES</div>
            <div class="m" data-i="1">SAD EYES</div>
            <div class="m" data-i="2">COUNTER SURF</div>
            <div class="m" data-i="3">SCREAM</div>
          </div>
          <div class="lcd"></div>
        </div>
      </div>
      <div class="hintline">
        Auto-playing demo loop — text advances itself (~1.6s/line); the host only ever inputs moves.
      </div>
    </div>

    <script>
      /* ---- procedural dithered placeholder sprites (stand-ins for generator art) ---- */
      const DMG = ["#0f380f", "#306230", "#8bac0f", "#9bbc0f"];
      const BAYER = [[0, 8, 2, 10], [12, 4, 14, 6], [3, 11, 1, 9], [15, 7, 13, 5]];

      function ditherSprite(canvas, size, painter) {
        canvas.width = canvas.height = size;
        const g = canvas.getContext("2d");
        g.clearRect(0, 0, size, size);
        painter(g, size);
        const img = g.getImageData(0, 0, size, size);
        const d = img.data;
        for (let y = 0; y < size; y++) {
          for (let x = 0; x < size; x++) {
            const i = (y * size + x) * 4;
            if (d[i + 3] < 120) { d[i + 3] = 0; continue; }
            const lum = (0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]) / 255;
            const noise = (BAYER[y % 4][x % 4] / 16 - 0.5) * 0.55;
            const level = Math.max(0, Math.min(3, Math.floor((lum + noise) * 3.6)));
            const hex = DMG[level];
            d[i] = parseInt(hex.slice(1, 3), 16);
            d[i + 1] = parseInt(hex.slice(3, 5), 16);
            d[i + 2] = parseInt(hex.slice(5, 7), 16);
            d[i + 3] = 255;
          }
        }
        g.putImageData(img, 0, 0);
      }

      function shade(g, x, y, r) {
        const grad = g.createRadialGradient(x - r * 0.4, y - r * 0.45, r * 0.15, x, y, r * 1.25);
        grad.addColorStop(0, "#e8e8e8");
        grad.addColorStop(0.65, "#9a9a9a");
        grad.addColorStop(1, "#4a4a4a");
        return grad;
      }
      function blob(g, x, y, rx, ry) {
        g.fillStyle = shade(g, x, y, Math.max(rx, ry));
        g.beginPath();
        g.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
        g.fill();
      }
      function tri(g, x1, y1, x2, y2, x3, y3, fill) {
        g.fillStyle = fill;
        g.beginPath(); g.moveTo(x1, y1); g.lineTo(x2, y2); g.lineTo(x3, y3); g.closePath(); g.fill();
      }

      /* enemy: cat, front view */
      function paintCat(g, s) {
        const u = s / 32;
        tri(g, 8 * u, 11 * u, 10 * u, 3 * u, 15 * u, 9 * u, "#9a9a9a");
        tri(g, 24 * u, 11 * u, 22 * u, 3 * u, 17 * u, 9 * u, "#7a7a7a");
        blob(g, 16 * u, 13 * u, 8.5 * u, 7.5 * u);            /* head */
        blob(g, 16 * u, 24 * u, 9.5 * u, 7 * u);              /* body */
        blob(g, 26.5 * u, 21 * u, 2 * u, 6 * u);              /* tail */
        g.fillStyle = "#161616";                               /* eyes */
        g.fillRect(12 * u, 12 * u, 2 * u, 2.4 * u);
        g.fillRect(19 * u, 12 * u, 2 * u, 2.4 * u);
        g.fillStyle = "#3a3a3a";                               /* nose */
        g.fillRect(15.2 * u, 15.4 * u, 1.8 * u, 1.4 * u);
      }

      /* player: dog, back view */
      function paintDogBack(g, s) {
        const u = s / 32;
        tri(g, 7 * u, 12 * u, 8 * u, 3 * u, 14 * u, 8 * u, "#8a8a8a");   /* ears */
        tri(g, 25 * u, 12 * u, 24 * u, 3 * u, 18 * u, 8 * u, "#6a6a6a");
        blob(g, 16 * u, 13 * u, 9 * u, 8 * u);                 /* back of head */
        blob(g, 16 * u, 27 * u, 13.5 * u, 8 * u);              /* shoulders */
        blob(g, 29 * u, 23 * u, 2.2 * u, 4.5 * u);             /* tail */
        g.fillStyle = "#5a5a5a";                               /* collar */
        g.fillRect(8.5 * u, 19.5 * u, 15 * u, 1.6 * u);
      }

      const enemyCanvas = document.getElementById("enemySprite");
      const playerCanvas = document.getElementById("playerSprite");
      ditherSprite(enemyCanvas, 96, paintCat);
      ditherSprite(playerCanvas, 112, paintDogBack);

      /* ---- battle demo script ---- */
      const el = (id) => document.getElementById(id);
      const textEl = el("text"), cursorEl = el("cursor"), menuEl = el("menu");
      const enemyHp = el("enemyHp"), playerHp = el("playerHp"), playerHpNum = el("playerHpNum");
      const enemySlot = el("enemySlot");
      const PLAYER_MAX = 31;

      const beats = [
        { t: "What will MAPLE do?", menu: 0 },
        { t: "MAPLE used ZOOMIES!", hit: "enemy" },
        { t: "It's super effective!", hp: ["enemy", 0.42] },
        { t: "GYM LEADER MATT's BISCUIT used BEG!", hit: "player" },
        { t: "It's not very effective...", hp: ["player", 0.74] },
        { t: "What will MAPLE do?", menu: 1 },
        { t: "MAPLE used SAD EYES!", hit: "enemy" },
        { t: "It's super effective!", hp: ["enemy", 0] },
        { t: "BISCUIT fainted!", faint: true },
        { t: "GYM LEADER MATT sent out PICKLE!", send: true },
        { t: "What will MAPLE do?", menu: 2 },
        { t: "MAPLE used COUNTER SURF!", hit: "enemy" },
        { t: "MAPLE's attack missed!" },
        { t: "PICKLE used JUDGE YOU! MAPLE held firm!", hit: "player", hp: ["player", 0.55] }
      ];

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      async function typeLine(line) {
        textEl.textContent = "";
        cursorEl.classList.remove("on");
        for (const ch of line) {
          textEl.textContent += ch;
          await sleep(26);
        }
      }

      function setHp(side, frac) {
        if (side === "enemy") {
          enemyHp.style.width = frac * 100 + "%";
        } else {
          playerHp.style.width = frac * 100 + "%";
          playerHpNum.textContent = Math.round(frac * PLAYER_MAX) + "/ " + PLAYER_MAX;
        }
      }

      async function showMenu(pick) {
        menuEl.classList.add("on");
        const items = [...menuEl.querySelectorAll(".m")];
        const path = [0, 1, 2, 3].slice(0, pick + 1);
        for (const i of path) {
          items.forEach((m) => m.classList.toggle("sel", +m.dataset.i === i));
          await sleep(430);
        }
        await sleep(500);
        menuEl.classList.remove("on");
        items.forEach((m) => m.classList.remove("sel"));
      }

      async function run() {
        for (;;) {
          setHp("enemy", 1);
          setHp("player", 1);
          el("enemyBench").textContent = "●●";
          el("enemySlot").classList.remove("fainted");
          ditherSprite(enemyCanvas, 96, paintCat);
          for (const beat of beats) {
            await typeLine(beat.t);
            if (beat.menu !== undefined) {
              await showMenu(beat.menu);
              continue;
            }
            if (beat.hit) {
              const slot = beat.hit === "enemy" ? enemySlot : el("playerSlot");
              slot.firstElementChild.classList.add("hitflash");
              setTimeout(() => slot.firstElementChild.classList.remove("hitflash"), 800);
            }
            if (beat.hp) setHp(beat.hp[0], beat.hp[1]);
            if (beat.faint) {
              enemySlot.classList.add("fainted");
              el("enemyBench").textContent = "○●";
            }
            if (beat.send) {
              ditherSprite(enemyCanvas, 96, paintDogBack); /* "PICKLE": reuse dog shape, front-ish */
              enemySlot.classList.remove("fainted");
              enemySlot.classList.add("entering");
              setHp("enemy", 1);
              setTimeout(() => enemySlot.classList.remove("entering"), 600);
            }
            cursorEl.classList.add("on");
            await sleep(1600);
          }
          await sleep(1200);
        }
      }
      run();
    </script>
  </body>
</html>
