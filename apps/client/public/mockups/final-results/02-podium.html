<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FINAL_RESULTS — 02 Podium Reveal</title>
    <style>
      :root {
        --bg: #0d0d0d; --text: #fff; --muted: #5e5e5e; --muted2: #a3a3a3;
        --primary: #f97316; --heat: #ef4444; --gold: #fbbf24;
        --silver: #c0c4cc; --bronze: #b08355;
        --teamA: #f97316; --teamB: #06b6d4; --teamC: #84cc16; --teamD: #f43f5e;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      .stage { height: 100dvh; display: grid; grid-template-rows: 1fr auto; }
      .body {
        position: relative;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: clamp(1.5rem, 3vw, 3rem);
        padding: clamp(2rem, 4vw, 4rem);
        overflow: hidden;
        text-align: center;
      }
      .body::before {
        content: ""; position: absolute; inset: 0;
        background:
          radial-gradient(ellipse at 50% 30%, rgba(251, 191, 36, 0.12) 0%, transparent 55%);
        pointer-events: none;
      }

      .heading {
        position: relative;
        margin: 0;
        font-size: clamp(2rem, 5.5vw, 6rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.01em;
        line-height: 0.9;
        color: var(--text);
      }
      .heading .accent { color: var(--gold); }

      .podium {
        position: relative;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: end;
        gap: clamp(0.85rem, 1.6vw, 2rem);
        max-width: 1000px;
        width: 100%;
      }

      .pillar {
        display: flex; flex-direction: column; align-items: center;
        gap: clamp(0.4rem, 0.8vh, 0.8rem);
      }
      .top-info {
        display: flex; flex-direction: column; align-items: center;
        gap: clamp(0.3rem, 0.6vh, 0.6rem);
      }
      .rank-num {
        font-family: ui-monospace, "Menlo", monospace;
        font-size: clamp(1.2rem, 1.7vw, 2rem);
        font-weight: 900;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
        color: var(--muted);
      }
      .pillar.gold .rank-num { color: var(--gold); }
      .pillar.silver .rank-num { color: var(--silver); }
      .pillar.bronze .rank-num { color: var(--bronze); }

      .team-name {
        margin: 0;
        font-size: clamp(1.4rem, 2.6vw, 3rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        line-height: 0.95;
        color: var(--text);
      }
      .pillar.gold .team-name {
        font-size: clamp(2rem, 4vw, 4.5rem);
        color: var(--gold);
        text-shadow: 0 0 60px rgba(251, 191, 36, 0.4);
      }

      .score-tag {
        display: inline-flex; align-items: baseline; gap: 0.3em;
        font-family: ui-monospace, "Menlo", monospace;
      }
      .score-tag .num {
        font-size: clamp(1.6rem, 2.6vw, 3rem);
        font-weight: 900;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.04em;
        color: var(--text);
      }
      .pillar.gold .score-tag .num {
        font-size: clamp(2.4rem, 4vw, 5rem);
        color: var(--gold);
      }
      .score-tag .unit {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(0.7rem, 1vw, 1.1rem);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--muted);
      }
      .pillar.gold .score-tag .unit { color: var(--gold); opacity: 0.85; }

      .block {
        width: 100%;
        position: relative;
        display: flex; align-items: flex-start; justify-content: center;
        padding-top: clamp(0.7rem, 1.2vh, 1.2rem);
      }
      .block::before {
        content: "";
        position: absolute; left: 0; right: 0; bottom: 0;
        background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 28%, transparent) 0%, color-mix(in srgb, var(--accent) 8%, transparent) 100%);
        border-top: 2px solid var(--accent);
        z-index: 0;
      }
      .pillar.gold   { --accent: var(--gold);   }
      .pillar.silver { --accent: var(--silver); }
      .pillar.bronze { --accent: var(--bronze); }

      .pillar.gold .block::before   { height: clamp(11rem, 22vh, 18rem); }
      .pillar.silver .block::before { height: clamp(7rem, 15vh, 12rem); }
      .pillar.bronze .block::before { height: clamp(5rem, 11vh, 9rem);  }

      .place-label {
        position: relative;
        z-index: 1;
        font-size: clamp(0.85rem, 1.1vw, 1.15rem);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.32em;
        color: var(--accent);
      }

      footer.splits {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 2px; background: rgba(255,255,255,0.04);
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      .col {
        --tint: var(--teamA);
        position: relative;
        background: linear-gradient(180deg, color-mix(in srgb, var(--tint) 14%, transparent) 0%, color-mix(in srgb, var(--tint) 4%, transparent) 100%), var(--bg);
        padding: clamp(0.85rem, 1.3vh, 1.5rem) clamp(1rem, 1.6vw, 2.25rem);
        display: flex; align-items: center; justify-content: space-between;
        gap: clamp(0.85rem, 1.4vw, 2rem); overflow: hidden;
      }
      .col.t-a { --tint: var(--teamA); }
      .col.t-b { --tint: var(--teamB); }
      .col.t-c { --tint: var(--teamC); }
      .col.t-d { --tint: var(--teamD); }
      .col.lead {
        background: linear-gradient(180deg, color-mix(in srgb, var(--tint) 30%, transparent) 0%, color-mix(in srgb, var(--tint) 10%, transparent) 100%), var(--bg);
      }
      .col::before {
        content: ""; position: absolute; inset: 0 auto 0 0;
        width: 3px; background: var(--tint); opacity: 0.55;
      }
      .col.lead::before { opacity: 1; }
      .left { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }
      .nm-c {
        font-size: clamp(0.95rem, 1.15vw, 1.4rem);
        font-weight: 800; color: var(--text);
        text-transform: uppercase; letter-spacing: 0.06em;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .mt {
        display: inline-flex; align-items: center; gap: 0.4em;
        font-size: clamp(0.7rem, 0.85vw, 0.95rem);
        text-transform: uppercase; letter-spacing: 0.18em;
        color: var(--muted2); font-weight: 600;
      }
      .col.lead .mt { color: var(--gold); }
      .pts {
        font-family: ui-monospace, "Menlo", monospace;
        font-size: clamp(1.8rem, 2.6vw, 3.2rem);
        font-weight: 900; color: var(--text);
        font-variant-numeric: tabular-nums; letter-spacing: -0.04em;
      }
      .col.lead .pts { color: var(--gold); }
      .trophy-foot { width: 1.1em; height: 1.1em;
        filter: drop-shadow(0 0 6px rgba(251,191,36,0.5));
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="body">
        <h2 class="heading"><span class="accent">Champion</span></h2>
        <div class="podium">
          <!-- 2nd place (silver) on left -->
          <div class="pillar silver">
            <div class="top-info">
              <span class="rank-num">02</span>
              <p class="team-name">Cool Cats</p>
              <span class="score-tag"><span class="num">31</span><span class="unit">pts</span></span>
            </div>
            <div class="block"><span class="place-label">2nd</span></div>
          </div>
          <!-- 1st place (gold) center -->
          <div class="pillar gold">
            <div class="top-info">
              <span class="rank-num">01</span>
              <p class="team-name">Team Heat</p>
              <span class="score-tag"><span class="num">38</span><span class="unit">pts</span></span>
            </div>
            <div class="block"><span class="place-label">1st</span></div>
          </div>
          <!-- 3rd place (bronze) on right -->
          <div class="pillar bronze">
            <div class="top-info">
              <span class="rank-num">03</span>
              <p class="team-name">Spice Lords</p>
              <span class="score-tag"><span class="num">25</span><span class="unit">pts</span></span>
            </div>
            <div class="block"><span class="place-label">3rd</span></div>
          </div>
        </div>
      </div>
      <footer class="splits">
        <div class="col t-a lead">
          <div class="left">
            <span class="mt">Winner <svg class="trophy-foot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span>
            <span class="nm-c">Team Heat</span>
          </div>
          <span class="pts">38</span>
        </div>
        <div class="col t-b"><div class="left"><span class="mt">2nd</span><span class="nm-c">Cool Cats</span></div><span class="pts">31</span></div>
        <div class="col t-c"><div class="left"><span class="mt">3rd</span><span class="nm-c">Spice Lords</span></div><span class="pts">25</span></div>
        <div class="col t-d"><div class="left"><span class="mt">4th</span><span class="nm-c">Mild Sauce</span></div><span class="pts">18</span></div>
      </footer>
    </div>
  </body>
</html>
