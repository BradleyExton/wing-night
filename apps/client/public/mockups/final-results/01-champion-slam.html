<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FINAL_RESULTS — 01 Champion Slam</title>
    <style>
      :root {
        --bg: #0d0d0d; --text: #fff; --muted: #5e5e5e; --muted2: #a3a3a3;
        --primary: #f97316; --heat: #ef4444; --gold: #fbbf24;
        --teamA: #f97316; --teamB: #06b6d4; --teamC: #84cc16; --teamD: #f43f5e;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100dvh; overflow: hidden;
        background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      .stage { height: 100dvh; display: grid; grid-template-rows: 1fr auto; }
      .body {
        position: relative;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: clamp(0.75rem, 1.6vw, 2rem);
        padding: clamp(2rem, 4vw, 4rem);
        overflow: hidden;
        text-align: center;
      }
      .body::before {
        content: ""; position: absolute; inset: -10%;
        background:
          radial-gradient(ellipse at 50% 40%, rgba(251, 191, 36, 0.18) 0%, transparent 55%),
          radial-gradient(ellipse at 30% 70%, rgba(249, 115, 22, 0.12) 0%, transparent 50%);
        pointer-events: none;
      }

      /* Falling sparks - subtle gold particles */
      .sparks {
        position: absolute; inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .spark {
        position: absolute;
        width: 4px; height: 4px;
        background: var(--gold);
        border-radius: 50%;
        opacity: 0;
        box-shadow: 0 0 8px rgba(251, 191, 36, 0.7);
        animation: fall 5s linear infinite;
      }
      .spark:nth-child(1) { left: 8%;  animation-delay: 0s;   animation-duration: 6s; }
      .spark:nth-child(2) { left: 18%; animation-delay: 1.2s; animation-duration: 5s; }
      .spark:nth-child(3) { left: 32%; animation-delay: 2.4s; animation-duration: 7s; }
      .spark:nth-child(4) { left: 46%; animation-delay: 0.6s; animation-duration: 5.5s; }
      .spark:nth-child(5) { left: 58%; animation-delay: 3s;   animation-duration: 6.5s; }
      .spark:nth-child(6) { left: 71%; animation-delay: 1.8s; animation-duration: 6s; }
      .spark:nth-child(7) { left: 84%; animation-delay: 4s;   animation-duration: 5s; }
      .spark:nth-child(8) { left: 92%; animation-delay: 2.6s; animation-duration: 7s; }
      @keyframes fall {
        0%   { transform: translateY(-10vh); opacity: 0; }
        10%  { opacity: 0.7; }
        90%  { opacity: 0.55; }
        100% { transform: translateY(110vh); opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .spark { animation: none !important; opacity: 0 !important; }
      }

      .eyebrow {
        position: relative;
        display: inline-flex; align-items: center; gap: 0.7em;
        text-transform: uppercase; letter-spacing: 0.42em;
        font-size: clamp(1rem, 1.4vw, 1.6rem);
        font-weight: 800; color: var(--gold);
      }
      .trophy {
        width: 1.4em; height: 1.4em;
        filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.7));
      }

      .team-name {
        position: relative;
        margin: 0;
        font-size: clamp(5rem, 14vw, 18rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.03em;
        line-height: 0.85;
        color: var(--gold);
        text-shadow:
          0 0 100px rgba(251, 191, 36, 0.55),
          0 0 240px rgba(251, 191, 36, 0.3);
      }

      .score {
        position: relative;
        margin: 0;
        display: inline-flex; align-items: baseline; gap: 0.4em;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .score .num {
        font-family: ui-monospace, "Menlo", monospace;
        font-size: clamp(2.5rem, 6vw, 7rem);
        font-weight: 900;
        color: var(--text);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.05em;
        line-height: 1;
      }
      .score .unit {
        font-size: clamp(1.1rem, 1.8vw, 2.2rem);
        font-weight: 800;
        color: var(--muted2);
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      footer.splits {
        display: grid; grid-template-columns: repeat(4, 1fr);
        gap: 2px; background: rgba(255,255,255,0.04);
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      .col {
        --tint: var(--teamA);
        position: relative;
        background: linear-gradient(180deg, color-mix(in srgb, var(--tint) 14%, transparent) 0%, color-mix(in srgb, var(--tint) 4%, transparent) 100%), var(--bg);
        padding: clamp(0.85rem, 1.3vh, 1.5rem) clamp(1rem, 1.6vw, 2.25rem);
        display: flex; align-items: center; justify-content: space-between;
        gap: clamp(0.85rem, 1.4vw, 2rem); overflow: hidden;
      }
      .col.t-a { --tint: var(--teamA); }
      .col.t-b { --tint: var(--teamB); }
      .col.t-c { --tint: var(--teamC); }
      .col.t-d { --tint: var(--teamD); }
      .col.lead {
        background: linear-gradient(180deg, color-mix(in srgb, var(--tint) 30%, transparent) 0%, color-mix(in srgb, var(--tint) 10%, transparent) 100%), var(--bg);
      }
      .col::before {
        content: ""; position: absolute; inset: 0 auto 0 0;
        width: 3px; background: var(--tint); opacity: 0.55;
      }
      .col.lead::before { opacity: 1; }
      .left { display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }
      .nm-c {
        font-size: clamp(0.95rem, 1.15vw, 1.4rem);
        font-weight: 800; color: var(--text);
        text-transform: uppercase; letter-spacing: 0.06em;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .mt {
        display: inline-flex; align-items: center; gap: 0.4em;
        font-size: clamp(0.7rem, 0.85vw, 0.95rem);
        text-transform: uppercase; letter-spacing: 0.18em;
        color: var(--muted2); font-weight: 600;
      }
      .col.lead .mt { color: var(--gold); }
      .pts {
        font-family: ui-monospace, "Menlo", monospace;
        font-size: clamp(1.8rem, 2.6vw, 3.2rem);
        font-weight: 900; color: var(--text);
        font-variant-numeric: tabular-nums; letter-spacing: -0.04em;
      }
      .col.lead .pts { color: var(--gold); }
      .trophy-foot { width: 1.1em; height: 1.1em;
        filter: drop-shadow(0 0 6px rgba(251,191,36,0.5));
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="body">
        <div class="sparks" aria-hidden>
          <span class="spark"></span><span class="spark"></span>
          <span class="spark"></span><span class="spark"></span>
          <span class="spark"></span><span class="spark"></span>
          <span class="spark"></span><span class="spark"></span>
        </div>
        <p class="eyebrow">
          <svg class="trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
          </svg>
          Champion
        </p>
        <p class="team-name">Team Heat</p>
        <p class="score">
          <span class="num">38</span><span class="unit">pts</span>
        </p>
      </div>
      <footer class="splits">
        <div class="col t-a lead">
          <div class="left">
            <span class="mt">Winner <svg class="trophy-foot" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span>
            <span class="nm-c">Team Heat</span>
          </div>
          <span class="pts">38</span>
        </div>
        <div class="col t-b"><div class="left"><span class="mt">2nd</span><span class="nm-c">Cool Cats</span></div><span class="pts">31</span></div>
        <div class="col t-c"><div class="left"><span class="mt">3rd</span><span class="nm-c">Spice Lords</span></div><span class="pts">25</span></div>
        <div class="col t-d"><div class="left"><span class="mt">4th</span><span class="nm-c">Mild Sauce</span></div><span class="pts">18</span></div>
      </footer>
    </div>
  </body>
</html>
